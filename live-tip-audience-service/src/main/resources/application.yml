server:
  port: 8081

spring:
  application:
    name: live-tip-audience-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/live_tip?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
    openfeign:
      circuitbreaker:
        enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

feign:
  client:
    config:
      default:
        connectTimeout: 2000
        readTimeout: 2000
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      analyticsProfile:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 2s
  timelimiter:
    instances:
      analyticsProfile:
        timeoutDuration: 2s

audience:
  finance-sync:
    interval-ms: 60000

logging:
  level:
    com.live.tip: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
